<!DOCTYPE html>
<html>
<head>
  <title>RPI Web Server</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" type="text/css" href="style.css">
  <link rel="icon" href="./favicon.png" type="image/x-icon" />
</head>
<body>
  <header></header>
  <div class="lighting">
    <div>DIODE LIGHTING <p id="board-diode-status">%STATE%</p></div>
    <a href="/board_diode_on"><button class="button acceptButton smallButton">ON</button></a>
    <a href="/board_diode_off"><button class="button cancelButton smallButton">OFF</button></a>  
  </div>
  </div>
  <div class="lighting">
    <div>DISPLAY LIGHTING</div>
    <a href="/lcd_on"><button class="button acceptButton smallButton">ON</button></a>
    <a href="/lcd_off"><button class="button cancelButton smallButton">OFF</button></a>  
  </div>
  <a href="/show_date"><button class="button acceptButton bigButton">SHOW DATE</button></a>
  <a href="/show_time"><button class="button acceptButton bigButton">SHOW TIME</button></a>
  <a href="/show_date_and_time"><button class="button acceptButton bigButton">SHOW DATE AND TIME</button></a>
  <a href="/clear"><button class="button cancelButton bigButton">CLEAR</button></a>
  <script>
    getStatus = () =>
      fetch('/board_diode_status')
        .then(response => response.json())
        .then(result => document.getElementById("board-diode-status").innerHTML = result.status ? "Enabled" : "Disabled");

    window.onload = (event) => {
      getStatus();
    };
  </script>
</body>
</html>
